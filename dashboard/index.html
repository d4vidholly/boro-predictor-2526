    body {
      background: var(--red);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* ── PAGE ─────────────────────────────────────────── */
    .page {
      max-width: 600px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .loading-state {
      text-align: center;
      padding: 4rem 0;
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── SECTION LABEL ────────────────────────────────── */
    .section-label {
      font-family: var(--font-display);
      font-weight: 900;
      font-style: italic;
      font-size: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.55);
      margin-bottom: 0.75rem;
    }

    /* ── MATCH CARD ───────────────────────────────────── */
    .match-card {
      background: var(--off-white);
      border-radius: 14px;
      padding: 2rem 1.75rem 1.75rem;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      color: var(--black);
    }

    /* red stripe accent */
    .match-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--red);
    }

    .match-meta {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(0,0,0,0.35);
      margin-bottom: 1.5rem;
    }

    .match-teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1rem;
    }

    .team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .team-badge {
      width: 64px;
      height: 64px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }

    .team-name {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--black);
      text-align: center;
      line-height: 1.25;
    }

    .match-vs {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.1rem;
      color: rgba(0,0,0,0.18);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
    }

    .match-date {
      margin-top: 1.5rem;
      text-align: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(0,0,0,0.35);
    }

    /* ── PREDICTION CARD ──────────────────────────────── */
    .prediction-card {
      background: var(--red-dark);
      border-radius: 14px;
      padding: 1.75rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    .prediction-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
    }

    .pred-badge {
      width: 44px;
      height: 44px;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
      flex-shrink: 0;
    }

    .pred-score {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 3rem;
      line-height: 1;
      color: var(--white);
    }

    .pred-divider {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 2rem;
      color: rgba(255,255,255,0.25);
      padding: 0 0.1rem;
    }

    /* ── PREDICTION UPGRADE ───────────────────────────── */
    .pred-upgrade {
      border-top: 1px solid rgba(255,255,255,0.12);
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      text-align: center;
    }

    .pred-upgrade-label {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--gold);
      margin-bottom: 0.3rem;
    }

    .pred-upgrade-text {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.55);
      margin-bottom: 0.9rem;
    }

    .btn-upgrade {
      background: var(--gold);
      color: var(--black);
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 6px;
      padding: 0.65rem 1.5rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-upgrade:hover { background: #ffc433; }

    /* No prediction yet */
    .no-prediction {
      text-align: center;
      padding: 0.5rem 0 0.25rem;
    }

    .no-prediction p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);

    .btn-predict {

      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;

      border-radius: 6px;
      padding: 0.7rem 1.5rem;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }

      align-items: center;
      gap: 0.6rem;
      background: #fff4d6;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      margin-top: 1rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: #7a5200;

      padding: 3rem 1rem;

      font-family: var(--font-display);
      font-weight: 900;
      font-size: 2rem;

      margin-top: 1rem;

  function badgePath(team) {
    return teams[team] || '../assets/badges/middlesbrough.svg';
  }

  function formatDate(dateStr) {
    if (!dateStr) return 'Date TBC';
    const parts = dateStr.split('/');
    if (parts.length !== 3) return dateStr;
    const [d, m, y] = parts;
    const date = new Date(`20${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`);
    if (isNaN(date)) return dateStr;
    return date.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }

  // ── INIT ───────────────────────────────────────────────
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    // TODO: restore auth redirect when sign-in flow is wired up
    // if (!session) { window.location.href = '../landing/'; return; }
    currentUser = session?.user ?? null;

    loadDashboard();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('page').style.display    = 'block';
  }

  // ── LOAD DASHBOARD ────────────────────────────────────
  async function loadDashboard() {
    const fixtureIndex = 0;
    const upcoming     = fixtures[fixtureIndex];

    const saved  = localStorage.getItem('boroScores');
    const scores = saved ? JSON.parse(saved) : null;
    const pred   = scores ? scores[fixtureIndex] : null;

    renderMatch(upcoming, fixtureIndex);
    renderPrediction(pred, upcoming);
    await loadPreviousResult();

    document.getElementById('match-section').style.display = 'block';
  }

  // ── PREVIOUS RESULT ───────────────────────────────────
  async function loadPreviousResult() {
    const { data, error } = await sb
      .from('results')
      .select('fixture_index, home_goals, away_goals')
      .order('fixture_index', { ascending: false })
      .limit(1);

    if (error || !data || data.length === 0) return;

    const result  = data[0];
    const fixture = fixtures[result.fixture_index];
    if (!fixture) return;

    const boroHome  = fixture.home === 'Middlesbrough';
    const boroGoals = boroHome ? result.home_goals : result.away_goals;
    const oppGoals  = boroHome ? result.away_goals : result.home_goals;
    const outcome   = boroGoals > oppGoals ? 'win' : boroGoals < oppGoals ? 'loss' : 'draw';
    const label     = outcome === 'win' ? 'Win' : outcome === 'loss' ? 'Loss' : 'Draw';

    document.getElementById('prev-result').textContent = label;
    document.getElementById('prev-result').className   = `prev-panel-value ${outcome}`;
    document.getElementById('prev-score').textContent  = `${result.home_goals} – ${result.away_goals}`;
  }

  // ── RENDER MATCH ──────────────────────────────────────
  function renderMatch(fixture, index) {
    document.getElementById('match-meta').textContent  = `Fixture ${index + 1} of 46 · EFL Championship`;
    document.getElementById('home-name').textContent   = shortName(fixture.home);
    document.getElementById('away-name').textContent   = shortName(fixture.away);
    document.getElementById('home-badge').src          = badgePath(fixture.home);
    document.getElementById('home-badge').alt          = fixture.home;
    document.getElementById('away-badge').src          = badgePath(fixture.away);
    document.getElementById('away-badge').alt          = fixture.away;
    document.getElementById('match-date').textContent  = formatDate(fixture.date);
  }

      card.innerHTML = `
        <div class="no-prediction">
          <p>You haven't predicted this match yet.</p>
          <a class="btn-predict" href="../predict/">Enter Prediction</a>
        </div>`;
      return;
    }

    const isBoroHome = fixture.home === 'Middlesbrough';
    card.innerHTML = `
      <div class="prediction-inner">
        <img class="pred-badge" src="${badgePath(fixture.home)}" alt="${fixture.home}">
        <div class="pred-score">${pred.home}</div>
        <div class="pred-divider">–</div>
        <div class="pred-score">${pred.away}</div>
        <img class="pred-badge" src="${badgePath(fixture.away)}" alt="${fixture.away}">
      </div>`;
  }

  init();
</script>
</body>
</html>
