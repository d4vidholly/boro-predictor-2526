<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UX Test — Card Layouts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../assets/tokens.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      background: #DDDBD8;
      color: var(--black);
      font-family: var(--font-body);
      min-height: 100vh;
      padding-bottom: 100px;
      display: flex;
      flex-direction: column;
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── HEADER ── */
    .site-header {
      background: var(--red);
      color: var(--white);
      text-align: center;
      padding: 1.25rem 1rem 1.1rem;
    }
    .site-header h1 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.2rem;
    }
    .site-header p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);
    }

    /* ── PICK TITLE ── */
    .pick-title {
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      color: rgba(0,0,0,0.55);
      text-align: center;
      margin: 1.5rem 1.25rem 1rem;
      line-height: 1.5;
    }

    /* ── LAYOUT ── */
    .comparison {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 1.25rem;
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 1.25rem;
    }
    .comparison > div {
      display: flex;
      flex-direction: column;
    }
    @media (max-width: 900px) {
      .comparison { grid-template-columns: 1fr; max-width: 550px; }
    }

    .col-label {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.38);
      text-align: center;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid rgba(0,0,0,0.1);
    }

    /* ── SHARED +/- BUTTONS ── */
    .ctrl-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.07);
      color: var(--black);
      font-size: 1.25rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      line-height: 1;
      flex-shrink: 0;
    }
    .ctrl-btn:hover  { background: rgba(0,0,0,0.13); }
    .ctrl-btn:active { background: rgba(0,0,0,0.18); }

    /* ════════════════════════════════════════
       OPTION A  (current vertical layout)
    ════════════════════════════════════════ */
    .boro-card {
      flex: 1;
      border-radius: 10px;
      padding: 2.25rem 2.6rem 2.25rem 2.25rem;
      background: var(--off-white);
      color: var(--black);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .boro-tab {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 14px;
      background: linear-gradient(to bottom, #e2e0dd, #d4d2cf);
      transition: background 0.3s;
    }
    .boro-card.win  .boro-tab { background: #3aaa6e; }
    .boro-card.loss .boro-tab { background: var(--red-dark); }
    .boro-card.draw .boro-tab { background: var(--gold); }

    .boro-team {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .boro-team:last-child { margin-bottom: 0; }
    .boro-name {
      flex: 1;
      margin-left: 0.7rem;
      font-size: 1rem;
      font-weight: 600;
    }
    .boro-ctrl { display: flex; align-items: center; gap: 6px; }
    .boro-num {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 900;
      width: 28px;
      text-align: center;
    }

    /* ════════════════════════════════════════
       OPTION B  (horizontal layout)
    ════════════════════════════════════════ */
    .s6-card {
      flex: 1;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
    }
    .s6-tab {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 14px;
      background: linear-gradient(to bottom, #e2e0dd, #d4d2cf);
      transition: background 0.3s;
    }
    .s6-card.win  .s6-tab { background: #3aaa6e; }
    .s6-card.loss .s6-tab { background: var(--red-dark); }
    .s6-card.draw .s6-tab { background: var(--gold); }

    .s6-match {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.25rem 2rem 2.25rem 1.1rem;
      gap: 0.25rem;
    }
    .s6-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      flex: 0 0 auto;
      width: 75px;
    }
    .s6-team-name {
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      color: var(--black);
      line-height: 1.3;
    }
    .s6-scores {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      flex: 1;
    }
    .s6-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .s6-num {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 900;
      width: 40px;
      text-align: center;
      line-height: 1;
      color: var(--black);
    }
    .s6-vs {
      font-size: 0.85rem;
      font-weight: 700;
      color: rgba(0,0,0,0.28);
    }

    /* ── BADGE PLACEHOLDER ── */
    .badge-circle {
      border-radius: 50%;
      background: #C8C6C3;
      flex-shrink: 0;
    }

    /* ── SELECTOR ── */
    .select-wrap {
      margin-top: 0.85rem;
      display: flex;
      justify-content: center;
    }
    .select-btn {
      width: 100%;
      height: 46px;
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 2px solid rgba(0,0,0,0.18);
      border-radius: 8px;
      background: transparent;
      color: rgba(0,0,0,0.45);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .select-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }
    .select-btn.chosen {
      background: var(--red);
      border-color: var(--red);
      color: var(--white);
    }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--black);
      padding: 0.75rem 1.25rem;
      display: flex;
      justify-content: center;
      z-index: 100;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    }
    .bar-submit {
      height: 46px;
      padding: 0 2.5rem;
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--gold);
      color: var(--black);
      transition: background 0.15s, transform 0.1s;
    }
    .bar-submit:hover  { background: #ffc433; }
    .bar-submit:active { transform: scale(0.97); }
  </style>
</head>
<body>

<div class="site-header">
  <h1>UX Test — Card Layouts</h1>
  <p>Interact with both designs independently, then pick your favourite</p>
</div>

<div class="main-content">
<p class="pick-title">Create your prediction for this match on the two cards below, and choose your preference</p>

<div class="comparison">

  <!-- OPTION A -->
  <div>
    <div class="col-label">Option A</div>
    <div class="boro-card" id="b-card">
      <div class="boro-tab"></div>
      <div class="boro-team">
        <div class="badge-circle" style="width:40px;height:40px;"></div>
        <div class="boro-name">Middlesbrough</div>
        <div class="boro-ctrl">
          <button class="ctrl-btn" onclick="changeBoro('home',-1)">&#8722;</button>
          <div class="boro-num" id="bh">0</div>
          <button class="ctrl-btn" onclick="changeBoro('home',1)">+</button>
        </div>
      </div>
      <div class="boro-team">
        <div class="badge-circle" style="width:40px;height:40px;"></div>
        <div class="boro-name">Swansea</div>
        <div class="boro-ctrl">
          <button class="ctrl-btn" onclick="changeBoro('away',-1)">&#8722;</button>
          <div class="boro-num" id="ba">0</div>
          <button class="ctrl-btn" onclick="changeBoro('away',1)">+</button>
        </div>
      </div>
    </div>
    <div class="select-wrap">
      <button class="select-btn" id="pick-a" onclick="pickOption('a')">Choose Option A</button>
    </div>
  </div>

  <!-- OPTION B -->
  <div>
    <div class="col-label">Option B</div>
    <div class="s6-card" id="s-card">
      <div class="s6-tab"></div>
      <div class="s6-match">
        <div class="s6-team">
          <div class="badge-circle" style="width:40px;height:40px;"></div>
          <span class="s6-team-name">Middlesbrough</span>
        </div>
        <div class="s6-scores">
          <div class="s6-col">
            <button class="ctrl-btn" onclick="changeS6('home',1)">+</button>
            <div class="s6-num" id="sh">0</div>
            <button class="ctrl-btn" onclick="changeS6('home',-1)">&#8722;</button>
          </div>
          <span class="s6-vs">v</span>
          <div class="s6-col">
            <button class="ctrl-btn" onclick="changeS6('away',1)">+</button>
            <div class="s6-num" id="sa">0</div>
            <button class="ctrl-btn" onclick="changeS6('away',-1)">&#8722;</button>
          </div>
        </div>
        <div class="s6-team">
          <div class="badge-circle" style="width:40px;height:40px;"></div>
          <span class="s6-team-name">Swansea</span>
        </div>
      </div>
    </div>
    <div class="select-wrap">
      <button class="select-btn" id="pick-b" onclick="pickOption('b')">Choose Option B</button>
    </div>
  </div>

</div>
</div>

<div class="bottom-bar">
  <button class="bar-submit" onclick="submitPredictions()">Submit</button>
</div>

<script>
  const SUPABASE_URL      = 'https://tkaayrdevanrozsbxmlv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrYWF5cmRldmFucm96c2J4bWx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTU2ODksImV4cCI6MjA5NDU5MTY4OX0.bnnFYJgolI5vasGlA74eVTyAQiCUgQsnz5_BbVGBmi0';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── Scores ──────────────────────────────────
  const bScore = { home: 0, away: 0 };
  const sScore = { home: 0, away: 0 };

  // ── Behavioural tracking ─────────────────────
  const pageLoadTime   = Date.now();
  let firstCardTouched = null;
  const taps           = { a: 0, b: 0 };
  const corrections    = { a: 0, b: 0 };
  const lastDelta      = { a: { home: null, away: null }, b: { home: null, away: null } };
  let optionASide      = 'left';

  function recordTap(card, team, delta) {
    if (!firstCardTouched) firstCardTouched = card;
    taps[card]++;
    const prev = lastDelta[card][team];
    if (prev !== null && prev !== delta) corrections[card]++;
    lastDelta[card][team] = delta;
  }

  // ── Card logic ───────────────────────────────
  function resultClass(score) {
    if (score.home > score.away) return 'win';
    if (score.home < score.away) return 'loss';
    return 'draw';
  }

  function changeBoro(team, delta) {
    recordTap('a', team, delta);
    bScore[team] = Math.min(9, Math.max(0, bScore[team] + delta));
    document.getElementById('bh').textContent = bScore.home;
    document.getElementById('ba').textContent = bScore.away;
    const card = document.getElementById('b-card');
    card.classList.remove('win','loss','draw');
    card.classList.add(resultClass(bScore));
  }

  function changeS6(team, delta) {
    recordTap('b', team, delta);
    sScore[team] = Math.min(9, Math.max(0, sScore[team] + delta));
    document.getElementById('sh').textContent = sScore.home;
    document.getElementById('sa').textContent = sScore.away;
    const card = document.getElementById('s-card');
    card.classList.remove('win','loss','draw');
    card.classList.add(resultClass(sScore));
  }

  // ── Preference ───────────────────────────────
  let picked    = null;
  let submitted = false;

  function pickOption(opt) {
    if (submitted) return;
    picked = opt;
    document.getElementById('pick-a').classList.toggle('chosen', opt === 'a');
    document.getElementById('pick-b').classList.toggle('chosen', opt === 'b');
  }

  // ── Submit ───────────────────────────────────
  async function submitPredictions() {
    if (submitted) return;
    if (!picked) {
      alert('Please choose Option A or Option B before submitting.');
      return;
    }

    const btn = document.querySelector('.bar-submit');
    btn.textContent = 'Submitting...';
    btn.disabled = true;

    const payload = {
      preference:           picked.toUpperCase(),
      first_card_touched:   firstCardTouched ? firstCardTouched.toUpperCase() : null,
      interactions_a:       taps.a,
      interactions_b:       taps.b,
      corrections_a:        corrections.a,
      corrections_b:        corrections.b,
      interacted_both:      taps.a > 0 && taps.b > 0,
      time_to_complete_ms:  Date.now() - pageLoadTime,
      viewport_width:       window.innerWidth,
      option_a_side:        optionASide,
    };

    const { error } = await sb.from('ux_votes').insert(payload);

    if (error) {
      console.error(error);
      alert('Something went wrong — please try again.');
      btn.textContent = 'Submit';
      btn.disabled = false;
      return;
    }

    submitted = true;
    btn.textContent = 'Submitted!';
    document.getElementById('pick-a').disabled = true;
    document.getElementById('pick-b').disabled = true;
  }

  // ── Randomise sides on load ──────────────────
  document.addEventListener('DOMContentLoaded', () => {
    if (Math.random() < 0.5) {
      const grid = document.querySelector('.comparison');
      grid.appendChild(grid.firstElementChild);
      optionASide = 'right';
    }
  });
</script>

</body>
</html>
